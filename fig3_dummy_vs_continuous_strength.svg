<text x="36" y="44" class="title">同样是 0-1 试点，连续规制强度并不相同</text>
<text x="36" y="70" class="subtitle">左侧均为 D_credit_dummy；右侧为 D_credit_cont_norm。该图说明 Fuzzy DID 比 0-1 DID 更贴合信贷导向规制能力的真实强度。</text>
<line x1="36" y1="88" x2="944" y2="88" stroke="#e5e7eb" stroke-width="1"/>

