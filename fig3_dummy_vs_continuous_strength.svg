<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620">
<title>dummy vs continuous</title>
<rect width="100%" height="100%" fill="#fbfbf8"/>
<style>
text { font-family: 'Microsoft YaHei','SimHei','Noto Sans CJK SC',Arial,sans-serif; fill: #243447; }
.title { font-size: 28px; font-weight: 700; }
.subtitle { font-size: 14px; fill: #6b7280; }
.axis { font-size: 12px; fill: #6b7280; }
.small { font-size: 11px; fill: #6b7280; }
.label { font-size: 12px; fill: #243447; }
